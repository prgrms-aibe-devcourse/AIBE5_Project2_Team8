# ==========================================
# Knoc (노크) Spring Boot Base Configuration
# ==========================================
spring.application.name=knoc

# 도커 비활성화
spring.docker.compose.enabled=false

# 1. 기본 활성 프로파일 설정 (로컬 개발 시에는 기본값을 사용하도록 설정 가능)
spring.profiles.active=prod

# 2. 공통 Thymeleaf 설정
spring.thymeleaf.cache=false

# 3. 공통 Swagger (OpenAPI) 설정
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.groups-order=DESC
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.swagger-ui.display-request-duration=true

# 4. 로깅 공통 설정
logging.level.org.hibernate.orm.jdbc.bind=DEBUG

# 인증 메일 설정
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=knoctest@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 허용하지 않는 도메인
email.blocked-domains=naver.com,daum.net,kakao.com,hanmail.net

# 토스페이먼츠 (결제창 방식)
# - 클라이언트 키: 브라우저에서 결제창 SDK 초기화에 사용
# - 시크릿 키: 서버에서 결제 승인(confirm)에만 사용
toss.payments.client-key=${TOSS_CLIENT_KEY:}
toss.payments.secret-key=${TOSS_SECRET_KEY:}
# - base-url: 토스페이먼츠 API 서버 주소 (RestClient baseUrl)
# - connect-timeout / read-timeout: 토스 API 호출 타임아웃 (스레드 블록 방지)
toss.payments.base-url=https://api.tosspayments.com
toss.payments.connect-timeout=3s
toss.payments.read-timeout=10s