# ==========================================
# Knoc (\uB178\uD06C) Production Configuration
# ==========================================

# 1. \uC6B4\uC601\uC6A9 \uB370\uC774\uD130\uBCA0\uC774\uC2A4 \uC5F0\uACB0 \uC124\uC815 (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/knoc?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 2. JPA \uC6B4\uC601 \uC124\uC815 (\uD83D\uDEA8 \uC6B4\uC601 \uD658\uACBD\uC5D0\uC11C\uB294 ddl-auto\uB97C none \uB610\uB294 validate\uB85C \uC124\uC815\uD574\uC57C \uC548\uC804\uD569\uB2C8\uB2E4)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 3. \uBCF4\uC548 \uBC0F \uC678\uBD80 \uC5F0\uB3D9 \uD1A0\uD070 (\uC6B4\uC601 \uC11C\uBC84 \uD658\uACBD \uBCC0\uC218\uC5D0\uC11C \uC8FC\uC785)
jwt.secret=${JWT_SECRET}
github.token=${GITHUB_TOKEN}

# 4. \uB3C4\uCEE4 \uCEF4\uD3EC\uC988 \uC790\uB3D9 \uC2E4\uD589 \uBE44\uD65C\uC131\uD654 (\uC6B4\uC601 \uD658\uACBD\uC740 \uC774\uBBF8 \uC778\uD504\uB77C\uAC00 \uAD6C\uCD95\uB41C \uC0C1\uD0DC\uC774\uBBC0\uB85C)
spring.docker.compose.enabled=false