# ==========================================
# Knoc (노크) Production Configuration
# ==========================================

# 1. 운영용 데이터베이스 연결 설정 (MySQL)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/knoc?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# 2. JPA 운영 설정 (🚨 운영 환경에서는 ddl-auto를 none 또는 validate로 설정해야 안전합니다)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 3. 보안 및 외부 연동 토큰 (운영 서버 환경 변수에서 주입)
jwt.secret=${JWT_SECRET}
github.token=${GITHUB_TOKEN}

# 4. 도커 컴포즈 자동 실행 비활성화 (운영 환경은 이미 인프라가 구축된 상태이므로)
spring.docker.compose.enabled=false