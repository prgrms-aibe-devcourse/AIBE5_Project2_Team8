<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
>
  <header th:fragment="headerFragment">
    <nav class="navbar navbar-expand-lg navbar-dark header-nav">
      <div class="container">
        <a class="navbar-brand fw-bold fs-4" th:href="@{/}"
          >knoc<span class="text-mint">.</span></a
        >

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav mx-auto">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">시니어 매칭</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/reviews}">멘토링 후기</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:href="@{/senior/apply}">시니어 지원하기</a>
            </li>
          </ul>

          <!-- 비로그인 상태 -->
          <div
            class="d-flex align-items-center gap-3"
            sec:authorize="!isAuthenticated()"
          >
            <a th:href="@{/auth/login}" class="text-decoration-none text-white"
              >로그인</a
            >
            <a th:href="@{/auth/signup}" class="btn btn-mint rounded-pill px-4"
              >회원가입</a
            >
          </div>

          <!-- 로그인 상태 -->
          <div
            class="d-flex align-items-center gap-3"
            sec:authorize="isAuthenticated()"
          >
            <!-- 내 멘토링 -->
            <a
              th:href="@{/my/mentoring}"
              class="text-decoration-none text-white"
              >내 멘토링</a
            >

            <!-- 역할 배지 -->
            <span
              class="badge rounded-pill px-3 py-2"
              style="background-color: #20c997; font-size: 0.8rem"
              sec:authorize="hasAuthority('SENIOR')"
              >시니어</span
            >
            <span
              class="badge rounded-pill px-3 py-2 bg-secondary"
              style="font-size: 0.8rem"
              sec:authorize="hasAuthority('USER')"
              >주니어</span
            >

            <!-- 로그아웃 -->
            <form th:action="@{/auth/logout}" method="post" class="m-0">
              <button
                type="submit"
                class="btn btn-outline-light rounded-pill px-4"
              >
                로그아웃
              </button>
            </form>
          </div>
        </div>
      </div>
    </nav>
  </header>
</html>
