<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen font-sans antialiased">
<div class="flex flex-col items-center justify-center py-12 px-4 min-h-screen">
    <div class="w-full max-w-xl bg-[#111827] border border-slate-800 rounded-3xl p-8 md:p-10 shadow-2xl relative overflow-hidden">

        <div class="text-center mb-10 border-b border-slate-800/50 pb-6">
            <h1 class="text-3xl font-black text-white mb-2">회원가입</h1>
            <p class="text-slate-400 font-medium text-sm">성장을 위한 여정을 시작하세요.</p>
        </div>

        <div th:if="${errorMessage}" class="mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-xl text-red-400 text-sm text-center">
            <span th:text="${errorMessage}">이미 사용 중인 이메일입니다.</span>
        </div>

        <form th:action="@{/auth/signup}" th:object="${signupDto}" method="post" class="space-y-6" novalidate>

            <div th:if="${successMessage}" class="mb-6 p-4 bg-green-500/10 border border-green-500/50 rounded-xl text-green-400 text-sm text-center font-bold">
                <span th:text="${successMessage}"></span>
            </div>

            <div class="space-y-2">
                <label for="nickname" class="text-sm font-bold text-slate-300">닉네임</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <input type="text" id="nickname" th:field="*{nickname}" required class="block w-full pl-12 pr-4 py-3.5 bg-[#0B0F19] border border-slate-700 text-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-shadow shadow-inner" placeholder="홍길동" />
                </div>
                <p th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}" class="text-red-400 text-xs font-bold pl-1"></p>
            </div>

            <div class="space-y-2">
                <label for="email" class="text-sm font-bold text-slate-300">가입 이메일</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500">
                            <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                        </svg>
                    </div>
                    <input type="email" id="email" th:field="*{email}" required class="block w-full pl-12 pr-4 py-3.5 bg-[#0B0F19] border border-slate-700 text-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-shadow shadow-inner" placeholder="hello@example.com" />
                </div>
                <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-400 text-xs font-bold pl-1"></p>
            </div>

            <div class="space-y-2">
                <label for="password" class="text-sm font-bold text-slate-300">비밀번호</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-500">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </div>
                    <input type="password" id="password" th:field="*{password}" required class="block w-full pl-12 pr-4 py-3.5 bg-[#0B0F19] border border-slate-700 text-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition-shadow shadow-inner" placeholder="••••••••" />
                </div>
                <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-red-400 text-xs font-bold pl-1"></p>
            </div>

            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-cyan-950 font-black py-4 rounded-xl mt-8 flex justify-center items-center gap-2 shadow-[0_0_15px_rgba(6,182,212,0.3)] transition-all">
                가입 완료하기
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <line x1="19" x2="19" y1="8" y2="14"></line>
                    <line x1="22" x2="16" y1="11" y2="11"></line>
                </svg>
            </button>

            <div class="mt-8 text-center text-sm font-medium text-slate-500 border-t border-slate-800/50 pt-6">
                이미 계정이 있으신가요?
                <a th:href="@{/auth/login}" class="text-cyan-400 font-bold hover:text-cyan-300 ml-1 inline-flex items-center gap-1 transition-colors">
                    로그인
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"></path>
                        <path d="m12 5 7 7-7 7"></path>
                    </svg>
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
