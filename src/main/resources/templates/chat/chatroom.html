<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default_layout}">

<head>
    <title>채팅방</title>
</head>

<th:block layout:fragment="head-extra">
    <style>
        .chat-wrapper {
            height: calc(100vh - 72px);
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1rem;
            background-color: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background-color: #333; border-radius: 4px; }

        .msg-bubble {
            padding: 0.6rem 1rem;
            border-radius: 16px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-left {
            align-self: flex-start;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 65%;
        }
        .msg-left .msg-bubble {
            background-color: #2a2a2a;
            color: #ffffff;
            border-bottom-left-radius: 4px;
        }

        .msg-right {
            align-self: flex-end;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            max-width: 65%;
        }
        .msg-right .msg-bubble {
            background-color: #00CFE8;
            color: #121212;
            border-bottom-right-radius: 4px;
        }

        .msg-sender {
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 0.25rem;
        }

        .msg-time {
            font-size: 0.7rem;
            color: #666;
            margin-top: 0.2rem;
        }

        .msg-right .msg-time { text-align: right; }

        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #00CFE8;
            box-shadow: 0 0 0 0.15rem rgba(0, 207, 232, 0.2);
        }

        .chat-input-area input::placeholder { color: #555; }

        .btn-send {
            background-color: #00CFE8;
            color: #121212;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-send:hover { background-color: #00A6BA; }

        .connection-status {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            margin-bottom: 0.75rem;
            display: inline-block;
        }

        .status-connected    { background-color: #1a3a2a; color: #00e676; }
        .status-disconnected { background-color: #3a1a1a; color: #ff5252; }
    </style>
</th:block>

<main layout:fragment="content">
    <div class="chat-wrapper">

        <!-- 연결 상태 표시 -->
        <div>
            <span id="connectionStatus" class="connection-status status-disconnected">연결 중...</span>
        </div>

        <!-- 메시지 목록 -->
        <div class="chat-messages" id="messageList">

            <!-- 과거 메시지 (Thymeleaf 렌더링) -->
            <th:block th:each="msg : ${messages}">
                <div th:class="${msg.sender.nickname == currentNickname} ? 'msg-right' : 'msg-left'">
                    <div class="msg-sender" th:text="${msg.sender.nickname}"></div>
                    <div class="msg-bubble" th:text="${msg.content}"></div>
                    <div class="msg-time"
                         th:text="${#temporals.format(msg.createdAt, 'HH:mm')}"></div>
                </div>
            </th:block>

        </div>

        <!-- 메시지 입력 -->
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." autocomplete="off" />
            <button class="btn-send" onclick="sendMessage()">전송</button>
        </div>

    </div>
</main>

<th:block layout:fragment="script">
    <!-- SockJS + STOMP -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <script th:inline="javascript">
        const roomId = [[${roomId}]];
        const currentNickname = [[${currentNickname}]];
        let stompClient = null;

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null; // 콘솔 디버그 로그 끄기

            stompClient.connect({}, function () {
                document.getElementById('connectionStatus').textContent = '연결됨';
                document.getElementById('connectionStatus').className = 'connection-status status-connected';

                // 내 개인 큐 구독
                stompClient.subscribe('/user/queue/chat', function (payload) {
                    const msg = JSON.parse(payload.body);
                    appendMessage(msg);
                });

                scrollToBottom();

            }, function () {
                document.getElementById('connectionStatus').textContent = '연결 끊김';
                document.getElementById('connectionStatus').className = 'connection-status status-disconnected';
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !stompClient) return;

            stompClient.send('/app/' + roomId + '/send', {}, JSON.stringify({ content: content }));
            input.value = '';
        }

        function appendMessage(msg) {
            const list = document.getElementById('messageList');

            const wrapper = document.createElement('div');
            const isMine = msg.senderNickname === currentNickname;
            wrapper.className = isMine ? 'msg-right' : 'msg-left';

            const sender = document.createElement('div');
            sender.className = 'msg-sender';
            sender.textContent = msg.senderNickname;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = msg.content;

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = formatTime(msg.createdAt);

            wrapper.appendChild(sender);
            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
            list.appendChild(wrapper);

            scrollToBottom();
        }

        function formatTime(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function scrollToBottom() {
            const list = document.getElementById('messageList');
            list.scrollTop = list.scrollHeight;
        }

        // Enter 키 전송 (isComposing 체크: 한글 IME 조합 중 이중 전송 방지)
        document.getElementById('messageInput').addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.isComposing) sendMessage();
        });

        connect();
    </script>
</th:block>

</html>
