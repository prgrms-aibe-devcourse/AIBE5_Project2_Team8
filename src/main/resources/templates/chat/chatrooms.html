<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default_layout}">

<head>
    <title>채팅</title>
</head>

<th:block layout:fragment="head-extra">
    <style>
        /* 전체 2-pane 컨테이너 */
        .chat-container {
            display: flex;
            height: calc(100vh - 72px);
            margin-top: 72px; /* fixed-top navbar(72px) 아래로 컨테이너를 내려서 헤더가 가려지지 않도록 */
            overflow: hidden;
        }

        /* ── 왼쪽 사이드바 ── */
        .chat-sidebar {
            width: 320px;
            min-width: 320px;
            border-right: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            background-color: #161616;
            transition: width 0.25s ease, min-width 0.25s ease;
            overflow: hidden;
        }

        .chat-sidebar.collapsed {
            width: 0;
            min-width: 0;
            border-right: none;
        }

        .sidebar-header {
            padding: 1.25rem 1rem 1rem;
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            white-space: nowrap;
        }

        .sidebar-toggle-btn {
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: color 0.15s;
        }

        .sidebar-toggle-btn:hover { color: #00CFE8; }

        /* 사이드바 접혔을 때 펼치기 버튼 */
        .sidebar-open-btn {
            display: none;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 0.75rem 0.5rem;
            transition: color 0.15s;
        }

        .sidebar-open-btn:hover { color: #00CFE8; }
        .sidebar-open-btn.visible { display: flex; align-items: center; }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }

        .sidebar-list::-webkit-scrollbar { width: 3px; }
        .sidebar-list::-webkit-scrollbar-thumb { background-color: #333; border-radius: 4px; }

        .room-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: 10px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.15s;
            margin-bottom: 0.25rem;
        }

        .room-item:hover { background-color: #222; }
        .room-item.active { background-color: #1a2a2a; border: 1px solid #00CFE8; }

        .room-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: #00CFE8;
            color: #121212;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .room-info { flex: 1; overflow: hidden; }

        .room-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 0.15rem;
        }

        .room-preview {
            font-size: 0.78rem;
            color: #777;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .room-time {
            font-size: 0.7rem;
            color: #555;
            flex-shrink: 0;
        }

        .sidebar-empty {
            padding: 2rem 1rem;
            text-align: center;
            color: #555;
            font-size: 0.85rem;
        }

        /* ── 오른쪽 채팅 패널 ── */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 방 미선택 빈 상태 */
        .chat-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #444;
            gap: 0.75rem;
        }

        .chat-empty svg { opacity: 0.3; }
        .chat-empty p { font-size: 0.9rem; }

        /* 채팅방 헤더 */
        .chat-header {
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .chat-header-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #00CFE8;
            color: #121212;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-header-name {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
        }

        .connection-status {
            font-size: 0.7rem;
            padding: 0.15rem 0.6rem;
            border-radius: 999px;
            margin-left: auto;
        }

        .status-connected    { background-color: #1a3a2a; color: #00e676; }
        .status-disconnected { background-color: #3a1a1a; color: #ff5252; }

        /* 메시지 목록 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 1.25rem;
        }

        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-thumb { background-color: #333; border-radius: 4px; }

        .msg-left {
            align-self: flex-start;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            max-width: 65%;
        }

        .msg-right {
            align-self: flex-end;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            max-width: 65%;
        }

        .msg-bubble {
            padding: 0.6rem 1rem;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .msg-left .msg-bubble {
            background-color: #2a2a2a;
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .msg-right .msg-bubble {
            background-color: #00CFE8;
            color: #121212;
            border-bottom-right-radius: 4px;
        }

        .msg-sender { font-size: 0.72rem; color: #777; margin-bottom: 0.2rem; }
        .msg-time   { font-size: 0.68rem; color: #555; margin-top: 0.2rem; }
        .msg-right .msg-time { text-align: right; }

        /* ── 시스템 메시지 & 마감 배너 스타일 ── */
        .system-message-card {
            margin: 15px auto;
            max-width: 80%;
            background: #1a2a3a;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #00CFE8;
        }

        .sys-header { font-weight: bold; margin-bottom: 8px; }
        .text-yellow { color: #f59e0b; }
        .text-blue { color: #3b82f6; }
        .text-gray { color: #9ca3af; }

        .sys-body { font-size: 0.9rem; margin-bottom: 10px; color: #fff; }

        .sys-action-btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .sys-action-btn:hover { opacity: 0.8; }
        .btn-yellow { background-color: #f59e0b; color: #fff; }
        .btn-blue { background-color: #3b82f6; color: #fff; }
        .btn-cyan { background-color: #06b6d4; color: #fff; }

        .chat-readonly-banner {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.25rem;
            background-color: #1e1e1e;
            color: #ff5252;
            border-top: 1px solid #2a2a2a;
            font-weight: bold;
            font-size: 0.9rem;
        }

        /* 입력창 */
        .chat-input-area {
            display: flex;
            gap: 0.5rem;
            padding: 1rem 1.25rem;
            border-top: 1px solid #2a2a2a;
        }

        .chat-input-area input {
            flex: 1;
            background-color: #1e1e1e;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #00CFE8;
            box-shadow: 0 0 0 0.15rem rgba(0, 207, 232, 0.2);
        }

        .chat-input-area input::placeholder { color: #555; }

        .btn-send {
            background-color: #00CFE8;
            color: #121212;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 0.7rem 1.25rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-send:hover { background-color: #00A6BA; }
    </style>
</th:block>

<main layout:fragment="content">
    <div class="chat-container">

        <div class="chat-sidebar" id="chatSidebar">
            <div class="sidebar-header">
                <span>💬 메시지</span>
                <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="사이드바 닫기">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-list">

                <div th:if="${#lists.isEmpty(rooms)}" class="sidebar-empty">
                    참여 중인 채팅방이 없어요
                </div>

                <th:block th:each="room : ${rooms}">
                    <a th:href="@{/chat/{id}(id=${room.id})}"
                       th:with="opponent=${room.junior.email == #authentication.name ? room.senior : room.junior}"
                       th:classappend="${room.id == selectedRoomId} ? ' active' : ''"
                       th:attr="data-room-id=${room.id}"
                       class="room-item">

                        <div class="room-avatar" th:text="${#strings.substring(opponent.nickname, 0, 1)}"></div>

                        <div class="room-info">
                            <div class="room-name" th:text="${opponent.nickname}"></div>
                            <div class="room-preview"
                                 th:text="${latestMessages[room.id] != null ? latestMessages[room.id].content : '아직 메시지가 없어요'}">
                            </div>
                        </div>

                        <div class="room-time"
                             th:if="${latestMessages[room.id] != null}"
                             th:text="${#temporals.format(latestMessages[room.id].createdAt, 'MM/dd')}">
                        </div>

                    </a>
                </th:block>

            </div>
        </div>

        <div class="chat-main">

            <div th:if="${selectedRoomId == null}" class="chat-empty">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#00CFE8" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                </svg>
                <p>채팅방을 선택해주세요</p>
            </div>

            <th:block th:if="${selectedRoomId != null}"
                      th:with="opponent=${selectedRoom.junior.email == #authentication.name ? selectedRoom.senior : selectedRoom.junior}">

                <div class="chat-header">
                    <button class="sidebar-open-btn" id="sidebarOpenBtn" onclick="toggleSidebar()" title="사이드바 열기">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>
                        </svg>
                    </button>
                    <div class="chat-header-avatar" th:text="${#strings.substring(opponent.nickname, 0, 1)}"></div>
                    <div class="chat-header-name" th:text="${opponent.nickname}"></div>
                    <span id="connectionStatus" class="connection-status status-disconnected">연결 중...</span>
                </div>

                <!-- 메시지 목록 -->
                <div class="chat-messages" id="messageList"
                th:attr="data-first-message-id=${firstMessageId}">
                    <th:block th:each="msg : ${messages}">

                        <div th:if="${msg.messageType.name() != 'USER'}"
                             th:classappend="${msg.messageType.name() == 'PAYMENT_REQUESTED'} ? ' type-payment' : ' type-default'"
                             class="system-message-card">

                            <div class="sys-header text-yellow" th:if="${msg.messageType.name() == 'PAYMENT_REQUESTED'}">
                                <span style="margin-right: 6px;">🪙</span> 시스템 알림
                            </div>
                            <div class="sys-header text-gray" th:if="${msg.messageType.name() == 'ROOM_CLOSE'}">
                                <span style="margin-right: 6px;">🔒</span> 시스템 알림
                            </div>
                            <div class="sys-header text-gray"
                                 th:if="${msg.messageType.name() != 'PAYMENT_REQUESTED' and msg.messageType.name() != 'ROOM_CLOSE'}">
                                <span style="margin-right: 6px;">🔔</span> 시스템 알림
                            </div>

                            <div class="sys-body" th:utext="${#strings.replace(#strings.escapeXml(msg.content), T(java.lang.System).lineSeparator(), '&lt;br&gt;')}"></div>

                            <!-- PAYMENT_REQUESTED: 주니어에게만 결제 버튼 노출 -->
                            <div class="sys-footer"
                                 th:if="${msg.messageType.name() == 'PAYMENT_REQUESTED' and !isSenior and msg.referenceId != null}">
                                <button type="button"
                                        class="sys-action-btn btn-yellow action-pay"
                                        th:attr="data-order-id=${msg.referenceId}"
                                        th:text="|🛡️ 에스크로 안전 결제 ₩${#numbers.formatInteger(orderAmounts[__${msg.referenceId}__] ?: 0, 0, 'COMMA')}|">
                                </button>
                            </div>
                        </div>

                        <div th:if="${msg.messageType.name() == 'USER'}" th:class="${msg.sender.nickname == currentNickname} ? 'msg-right' : 'msg-left'">
                            <div class="msg-sender" th:text="${msg.sender.nickname}"></div>
                            <div class="msg-bubble" th:text="${msg.content}"></div>
                            <div class="msg-time" th:text="${#temporals.format(msg.createdAt, 'HH:mm')}"></div>
                        </div>

                    </th:block>
                </div>

                <div class="chat-input-area" id="inputArea" th:if="${selectedRoom.status.name() == 'ACTIVE'}">
                    <input type="text"
                           id="messageInput"
                           placeholder="메시지를 입력하세요..."
                           autocomplete="off"/>
                    <button class="btn-send" onclick="sendMessage()">전송</button>
                </div>

                <div class="chat-input-area disabled" id="inputAreaDisabled" th:if="${selectedRoom.status.name() == 'CLOSED'}">
                    <input type="text"
                           id="messageInputDisabled"
                           placeholder="마감된 멘토링입니다. 메시지 전송이 제한됩니다."
                           disabled
                           style="background-color: #2a2a2a; color: #777; cursor: not-allowed;" />
                    <button class="btn-send" disabled style="background-color: #333; color: #555; cursor: not-allowed;">전송</button>
                </div>

                <div class="chat-readonly-banner" id="readonlyBanner" th:if="${selectedRoom.status.name() == 'CLOSED'}">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ff5252" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <span>마감된 멘토링입니다. 더 이상 메시지를 보낼 수 없습니다.</span>
                </div>

            </th:block>

        </div>
    </div>
</main>

<th:block layout:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <script th:inline="javascript">
        const selectedRoomId = [[${selectedRoomId}]];
        const currentNickname = [[${currentNickname}]];
        let cursor = [[${firstMessageId}]];
        let stompClient = null;

        // 방이 선택된 경우에만 WebSocket 연결
        if (selectedRoomId) {
            connect();
        }

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function () {
                document.getElementById('connectionStatus').textContent = '연결됨';
                document.getElementById('connectionStatus').className = 'connection-status status-connected';

                stompClient.subscribe('/user/queue/chat', function (payload) {
                    const msg = JSON.parse(payload.body);
                    appendMessage(msg);
                });

                scrollToBottom();

            }, function () {
                document.getElementById('connectionStatus').textContent = '연결 끊김';
                document.getElementById('connectionStatus').className = 'connection-status status-disconnected';
            });
        }

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content || !stompClient) return;

            stompClient.send('/app/' + selectedRoomId + '/send', {}, JSON.stringify({ content: content }));
            input.value = '';
        }

        function appendMessage(msg) {
            const list = document.getElementById('messageList');
            if (!list) return;

            const wrapper = document.createElement('div');
            const isMine = msg.senderNickname === currentNickname;
            wrapper.className = isMine ? 'msg-right' : 'msg-left';

            const sender = document.createElement('div');
            sender.className = 'msg-sender';
            sender.textContent = msg.senderNickname;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = msg.content;

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = formatTime(msg.createdAt);

            wrapper.appendChild(sender);
            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
            list.appendChild(wrapper);
            scrollToBottom();

            // 사이드바 최신 메시지 미리보기 실시간 업데이트
            updateSidebarPreview(msg.content);
        }

        function prependMessage(msg) {
            const list = document.getElementById('messageList');
            if (!list) return;

            const wrapper = document.createElement('div');
            const isMine = msg.senderNickname === currentNickname;
            wrapper.className = isMine ? 'msg-right' : 'msg-left';

            const sender = document.createElement('div');
            sender.className = 'msg-sender';
            sender.textContent = msg.senderNickname;

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.textContent = msg.content;

            const time = document.createElement('div');
            time.className = 'msg-time';
            time.textContent = formatTime(msg.createdAt);

            wrapper.appendChild(sender);
            wrapper.appendChild(bubble);
            wrapper.appendChild(time);
            list.prepend(wrapper);  // append 대신 prepend
        }

        function updateSidebarPreview(content) {
            const roomItem = document.querySelector(`.room-item[data-room-id="${selectedRoomId}"]`);
            if (!roomItem) return;
            const preview = roomItem.querySelector('.room-preview');
            if (preview) preview.textContent = content;
            const timeEl = roomItem.querySelector('.room-time');
            if (timeEl) {
                const now = new Date();
                timeEl.textContent = (now.getMonth()+1).toString().padStart(2,'0') + '/' + now.getDate().toString().padStart(2,'0');
            }
        }

        // 사이드바 토글
        function toggleSidebar() {
            const sidebar = document.getElementById('chatSidebar');
            const openBtn = document.getElementById('sidebarOpenBtn');
            sidebar.classList.toggle('collapsed');
            if (openBtn) openBtn.classList.toggle('visible');
        }

        function formatTime(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function scrollToBottom() {
            const list = document.getElementById('messageList');
            if (list) list.scrollTop = list.scrollHeight;
        }

        if (selectedRoomId) {
            document.getElementById('messageInput').addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.isComposing) sendMessage();
            });
        }

        let isLoading = false;
        const messageList = document.getElementById('messageList');
        if (messageList) {
            messageList.addEventListener('scroll', function () {
                if (messageList.scrollTop === 0 && !isLoading) {
                    isLoading = true;
                    fetch(`/chat/${selectedRoomId}/messages?before=${cursor}`)
                        .then(res => res.json())
                        .then(messages => {
                            if (messages.length === 0) return;
                            const prevHeight = messageList.scrollHeight;
                            messages.forEach(msg => prependMessage(msg));
                            messageList.scrollTop = messageList.scrollHeight - prevHeight;
                            cursor = messages[0].id;
                        })
                        .finally(() => { isLoading = false; });
                }
            });
        }
    </script>

    <script src="/js/chat.js"></script>
</th:block>

</html>
