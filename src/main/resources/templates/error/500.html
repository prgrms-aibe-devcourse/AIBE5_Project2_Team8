<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - 서버 오류 | Knoc</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0d1117;
            --bg-card: #161b22;
            --bg-card-inner: #1c2128;
            --border: rgba(48, 54, 61, 0.8);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --accent: #00c8c8;
            --error-color: #9d7ae8;
            --error-dim: rgba(157, 122, 232, 0.12);
            --error-border: rgba(157, 122, 232, 0.35);
            --btn-ghost-border: rgba(139, 148, 158, 0.3);
            --btn-ghost-hover: rgba(139, 148, 158, 0.08);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,200,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,200,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 560px;
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            color: #0d1117;
            letter-spacing: -0.5px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .error-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem 2rem;
        }

        .icon-wrap {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: var(--error-dim);
            border: 1px solid var(--error-border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-wrap i {
            font-size: 36px;
            color: var(--error-color);
        }

        .error-code {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--error-color);
            margin-bottom: 0.75rem;
        }

        .error-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.3;
            margin-bottom: 1rem;
        }

        .error-desc {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        /* Status checklist */
        .status-box {
            margin-top: 1.5rem;
            padding: 1rem 1.25rem;
            background: var(--bg-card-inner);
            border: 1px solid var(--border);
            border-radius: 10px;
            text-align: left;
        }

        .status-box-title {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-item + .status-item {
            border-top: 1px solid rgba(48, 54, 61, 0.5);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-ok { background: #3fb950; }
        .dot-warn { background: #e8a838; }
        .dot-err { background: #e05c5c; }

        /* Countdown retry */
        .retry-hint {
            margin-top: 1.25rem;
            padding: 0.75rem 1rem;
            background: var(--error-dim);
            border: 1px solid var(--error-border);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .retry-hint i {
            color: var(--error-color);
            font-size: 15px;
            flex-shrink: 0;
        }

        .server-message {
            margin-top: 1.25rem;
            padding: 0.875rem 1rem;
            background: var(--bg-card-inner);
            border: 1px solid var(--border);
            border-left: 3px solid var(--error-color);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            text-align: left;
            line-height: 1.6;
        }

        .server-message .msg-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 2rem 0;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.65rem 1.4rem;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, background 0.15s;
        }

        .btn-primary {
            background: var(--accent);
            color: #0d1117;
        }

        .btn-primary:hover { opacity: 0.88; }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--btn-ghost-border);
        }

        .btn-ghost:hover {
            background: var(--btn-ghost-hover);
            color: var(--text-primary);
        }

        @media (max-width: 480px) {
            .btn-group { flex-direction: column; }
            .btn { justify-content: center; }
            .error-title { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="container">

    <a href="/" class="logo">
        <div class="logo-mark">K</div>
        <span class="logo-text">Knoc.</span>
    </a>

    <div class="error-card">

        <div class="icon-wrap">
            <i class="bi bi-gear"></i>
        </div>

        <p class="error-code">Error 500</p>
        <h1 class="error-title">안정적인 서비스 제공을 위해 점검 중입니다</h1>
        <p class="error-desc">
            현재 시스템 최적화 및 서버 안정화 작업을 진행하고 있습니다.<br>
            더욱 쾌적한 Knoc를 만들기 위한 과정이오니 잠시만 기다려 주세요.
        </p>

        <!-- Status indicators -->
        <div class="status-box">
            <div class="status-box-title">서비스 상태</div>
            <div class="status-item">
                <span class="status-dot dot-ok"></span>
                DB 연결 상태 : 원활
            </div>
            <div class="status-item">
                <span class="status-dot dot-warn"></span>
                시스템 업데이트 : 진행 중
            </div>
            <div class="status-item">
                <span class="status-dot dot-ok"></span>
                정적 리소스 : 원활
            </div>
        </div>

        <!-- Retry suggestion -->
        <div class="retry-hint">
            <i class="bi bi-arrow-clockwise"></i>
            작업이 완료되면 자동으로 서비스가 재개됩니다.
        </div>

        <!-- Thymeleaf: server message (optional) -->
        <div class="server-message" th:if="${message != null and !#strings.isEmpty(message)}">
            <div class="msg-label">상세 메시지</div>
            <span th:text="${message}"></span>
        </div>

        <div class="divider"></div>

        <div class="btn-group">
            <a href="/" class="btn btn-primary">
                <i class="bi bi-house-fill" style="font-size:14px;"></i>
                메인으로 돌아가기
            </a>
            <button onclick="history.back()" class="btn btn-ghost">
                <i class="bi bi-arrow-left" style="font-size:14px;"></i>
                이전 페이지로
            </button>
        </div>

    </div>

</div>

</body>
</html>
