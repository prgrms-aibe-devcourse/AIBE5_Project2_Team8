<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE">Knoc.</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212; /* 딥 다크 배경 */
            color: #ffffff;
            font-family: 'Pretendard', sans-serif; /* Pretendard 폰트 사용 권장 */
        }

        /* 🚨 노란빛을 완전히 빼고, 파란빛을 더한 청량한 하늘색 민트 (#00CFE8)로 변경! */
        .text-mint { color: #00CFE8 !important; } /* 포인트 텍스트 */
        .bg-mint { background-color: #00CFE8 !important; color: #121212; } /* 포인트 배경 */

        /* 민트색 포인트 버튼 스타일 (회원가입, 검색 버튼) */
        .btn-mint {
            background-color: #00CFE8 !important;
            color: #121212 !important;
            font-weight: bold;
            border: none;
        }

        /* 마우스 올렸을 때 살짝 어두워지는 하늘색 민트색 */
        .btn-mint:hover {
            background-color: #00A6BA !important;
            color: #121212 !important;
        }

        /* 다크 모드 카드 및 배지 스타일 */
        .card-dark { background-color: #1e1e1e; border: 1px solid #333; }
        .badge-dark { background-color: #2a2a2a; border: 1px solid #444; color: #aaa; }

        /* 검색창 포커스 시 테두리 민트색 효과 */
        .form-control.bg-dark:focus {
            background-color: #2a2a2a;
            border-color: #00CFE8;
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(0, 207, 232, 0.25);
        }

        /* 그라데이션 텍스트 (히어로 문구 강조) */
        .text-gradient {
            background: linear-gradient(90deg, #5b7cff 0%, #00cfe8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        /* 히어로 상단 필(배지) */
        .hero-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.35rem 0.9rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 207, 232, 0.25);
            background: rgba(0, 207, 232, 0.06);
            box-shadow: 0 8px 28px rgba(0, 207, 232, 0.1);
        }
        /* hero-pill 텍스트 색상 변형 */
        .hero-pill.hero-pill--violet {
            color: #8b7cff;
            border-color: rgba(139, 124, 255, 0.35);
            background: rgba(139, 124, 255, 0.06);
            box-shadow: 0 8px 28px rgba(139, 124, 255, 0.12);
        }

        /* 헤더 메뉴 active 스타일 */
        .header-nav {
            background-color: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
        }
        .header-nav .navbar-nav {
            background: transparent;
            border: none;
        }
        .header-nav .navbar-nav .nav-link {
            border-radius: 999px;
            padding: 0.55rem 1.05rem;
            /* 비활성 메뉴: 연한 회색 */
            color: rgba(255, 255, 255, 0.62) !important;
            font-weight: 600;
            transition:
                    background-color 0.15s ease,
                    color 0.15s ease;
        }
        .header-nav .navbar-nav .nav-link:hover {
            color: rgba(255, 255, 255, 0.82) !important;
            background: rgba(255, 255, 255, 0.06);
        }
        .header-nav .navbar-nav .nav-link.active {
            /* 활성 메뉴: 해당 메뉴만 pill 배경 + 흰색 텍스트 */
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.98) !important;
        }

        /* 헤더 로고 이미지 */
        .knoc-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
            display: block;
        }
    </style>
    <th:block layout:fragment="head-extra"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/header :: headerFragment}"></th:block>

<main layout:fragment="content" class="container-fluid p-0">
</main>

<th:block th:replace="~{fragments/footer :: footerFragment}"></th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        var nav = document.querySelector(".header-nav .navbar-nav");
        if (!nav) return;

        var links = nav.querySelectorAll("a.nav-link[href]");

        function normalizePath(p) {
            if (!p) return "/";
            p = p.split("?")[0].split("#")[0];
            if (p.length > 1 && p.endsWith("/")) p = p.slice(0, -1);
            return p;
        }

        var current = normalizePath(window.location.pathname || "/");

        // 초기화
        links.forEach(function (a) {
            a.classList.remove("active");
        });

        // 경로별 active
        links.forEach(function (a) {
            var href = a.getAttribute("href");
            if (!href) return;

            // 상대/절대 URL 모두 pathname으로 비교
            var targetPath;
            try {
                targetPath = new URL(href, window.location.origin).pathname;
            } catch (e) {
                targetPath = href; // 혹시 파싱 실패 시 원문 사용
            }
            targetPath = normalizePath(targetPath);

            if (targetPath === "/" && current === "/") {
                a.classList.add("active");
            } else if (
                targetPath !== "/" &&
                (current === targetPath || current.startsWith(targetPath + "/"))
            ) {
                a.classList.add("active");
            }
        });
    });
</script>
<th:block layout:fragment="script"></th:block>
</body>
</html>
