# ==========================================
# Knoc (노크) Test Configuration
# ==========================================

# 1. H2 인메모리 데이터베이스 설정
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# 2. JPA 테스트 설정 (테스트 시작 시 테이블 생성, 종료 시 삭제)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. 테스트용 가짜 보안 정보(32자가 넘게 secretKey 다시 세팅)
jwt.secret=knoc-test-only-secret-key-1234567890    
github.token=test-mock-token

# 4. 테스트 속도를 위해 도커 및 기타 무거운 설정 비활성화
spring.docker.compose.enabled=false